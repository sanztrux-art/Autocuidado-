<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C97B5A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Autocuidado">
<title>Reset Mental — Autocuidado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f7f3f1;color:#3d2e2a;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
#header{background:#fff;padding:14px 18px 12px;border-bottom:1px solid #f0e8e4;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
#header .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#C97B5A,#A0637C);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
#header .title{font-size:17px;font-weight:800;color:#3d2e2a}
#header .sub{font-size:11px;color:#C97B5A;font-weight:600}
#content{flex:1;overflow-y:auto;padding-bottom:4px}
#tabbar{display:flex;border-top:1px solid #e8ddd8;background:#fff;position:sticky;bottom:0;z-index:10;overflow-x:auto}
.tab-btn{flex:1;min-width:56px;padding:8px 2px 6px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;color:#bbb;font-size:8px;font-weight:500;font-family:inherit;transition:color .2s}
.tab-btn.active{color:#C97B5A;font-weight:700}
.tab-btn .ticon{font-size:17px}
.tab-indicator{width:16px;height:2px;background:#C97B5A;border-radius:2px;margin-top:2px;opacity:0}
.tab-btn.active .tab-indicator{opacity:1}
.card{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.section-title{font-size:12px;font-weight:700;color:#C97B5A;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.page{padding:16px 16px 8px;display:none}
.page.active{display:block}
.pbar-wrap{height:8px;background:#f0e8e4;border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#C97B5A,#A0637C);transition:width .4s}

/* HABIT SCALE */
.habit-item{background:#fff;border-radius:14px;margin-bottom:8px;padding:12px 14px;border:1.5px solid #f0e8e4;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.habit-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.habit-label{font-size:14px;font-weight:600;color:#3d2e2a;flex:1}
.habit-desc{font-size:11px;color:#bbb;margin-top:1px}
.habit-score-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
.scale-row{display:flex;gap:4px}
.scale-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px 6px;border-radius:10px;border:1.5px solid #eee;background:#faf8f7;cursor:pointer;transition:all .2s;user-select:none}
.scale-btn .s-icon{font-size:18px;line-height:1}
.scale-btn .s-label{font-size:9px;color:#aaa;text-align:center;line-height:1.2;font-weight:500}
.scale-btn.active .s-label{font-weight:700}
.scale-btn[data-level="0"].active{background:#FDE8E8;border-color:#E07B54}
.scale-btn[data-level="0"].active .s-label{color:#E07B54}
.scale-btn[data-level="1"].active{background:#FBF0EB;border-color:#C97B5A}
.scale-btn[data-level="1"].active .s-label{color:#C97B5A}
.scale-btn[data-level="2"].active{background:#FBF5E8;border-color:#D4A040}
.scale-btn[data-level="2"].active .s-label{color:#D4A040}
.scale-btn[data-level="3"].active{background:#EBF5EE;border-color:#6A9E7A}
.scale-btn[data-level="3"].active .s-label{color:#6A9E7A}
.scale-btn[data-level="4"].active{background:#EBF2FB;border-color:#5A7BA0}
.scale-btn[data-level="4"].active .s-label{color:#5A7BA0}
.cat-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;margin-top:4px}
.cat-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}

/* CHALLENGE */
.challenge-card{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);border:1.5px solid #f0e8e4}
.challenge-card.done{border-color:#C97B5A55}
.challenge-icon{width:44px;height:44px;border-radius:12px;background:#f5f0ee;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.challenge-card.done .challenge-icon{background:#FBF0EB}
.btn-mark{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;background:#f0e8e4;color:#C97B5A}
.btn-mark.done{background:#C97B5A;color:#fff}
.btn-note{background:none;border:none;color:#A0637C;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.stat-val{font-size:22px;font-weight:800;color:#C97B5A}
.stat-lbl{font-size:10px;color:#aaa;margin-top:2px}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:72px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px;background:#f0e8e4}
.bar.filled{background:linear-gradient(180deg,#C97B5A,#A0637C)}
.bar-lbl{font-size:9px;color:#aaa}

/* TEST */
.test-opt{padding:10px 14px;border-radius:10px;margin-bottom:6px;cursor:pointer;font-size:13px;background:#faf8f7;border:1.5px solid #eee;color:#666;transition:all .2s;user-select:none}
.test-opt.sel-a{background:#EBF5EE;border-color:#6A9E7A;color:#3d2e2a}
.test-opt.sel-b{background:#FBF0EB;border-color:#C97B5A;color:#3d2e2a}
.test-opt.sel-c{background:#FDE8E8;border-color:#E07B54;color:#3d2e2a}

/* GOALS */
.goal-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-radius:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.goal-check{width:24px;height:24px;border-radius:7px;border:2px solid #C97B5A;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.goal-check.done{background:#C97B5A}
.goal-text{flex:1;font-size:14px;color:#3d2e2a}
.goal-text.done{text-decoration:line-through;color:#aaa}
.goal-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:18px;font-family:inherit}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:100}
#modal-overlay.open{display:flex}
#modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;margin:0 auto}
#modal-title{font-size:15px;font-weight:700;color:#3d2e2a;margin-bottom:12px}
#modal-textarea{width:100%;min-height:100px;border:1.5px solid #e8ddd8;border-radius:10px;padding:10px;font-size:14px;font-family:inherit;resize:none;outline:none;background:#faf8f7;color:#4a3d38}
.modal-btns{display:flex;gap:10px;margin-top:14px}
.btn-cancel{flex:1;padding:12px;border:1.5px solid #e8ddd8;border-radius:10px;background:none;font-size:14px;cursor:pointer;font-family:inherit}
.btn-save{flex:2;padding:12px;border:none;border-radius:10px;background:#C97B5A;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#3d2e2a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hero-card{background:linear-gradient(135deg,#FBF0EB,#F9EDF3);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.day-dots{display:flex;gap:5px;flex-wrap:wrap}
.day-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#e8ddd8;color:#aaa}
.day-dot.done{background:#C97B5A;color:#fff}
.scale-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.legend-chip{display:flex;align-items:center;gap:4px;font-size:10px;color:#888;background:#fff;padding:4px 8px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* ── ARRANCA YA ── */
.arranca-option{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#fff;border-radius:14px;margin-bottom:8px;border:1.5px solid #f0e8e4;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.arranca-option:active{transform:scale(.98)}
.arranca-option.selected{border-color:#C97B5A;background:#FBF0EB}
.arranca-icon{font-size:26px;flex-shrink:0}
.arranca-label{font-size:14px;font-weight:600;color:#3d2e2a}
.arranca-sub{font-size:11px;color:#aaa;margin-top:2px}
.micro-task{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#fff;border-radius:14px;margin-bottom:8px;border:1.5px solid #f0e8e4;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.micro-task:active{transform:scale(.98)}
.micro-task.done-task{background:#EBF5EE;border-color:#6A9E7A}
.micro-check{width:26px;height:26px;border-radius:8px;border:2px solid #C97B5A;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:transparent;transition:all .2s}
.micro-task.done-task .micro-check{background:#6A9E7A;border-color:#6A9E7A;color:#fff}
.feeling-btn{flex:1;padding:12px 6px;border-radius:12px;border:1.5px solid #eee;background:#faf8f7;cursor:pointer;text-align:center;font-size:22px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.feeling-btn span{font-size:10px;color:#aaa;font-weight:600}
.feeling-btn.active{border-color:#C97B5A;background:#FBF0EB}
.feeling-btn.active span{color:#C97B5A}
.btn-primary{width:100%;padding:14px;background:#C97B5A;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-secondary{width:100%;padding:12px;background:none;border:1.5px solid #C97B5A;border-radius:12px;color:#C97B5A;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.step-indicator{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.step-dot{width:8px;height:8px;border-radius:50%;background:#e8ddd8;transition:all .2s}
.step-dot.active{background:#C97B5A;width:20px;border-radius:4px}
.step-dot.done{background:#6A9E7A}

/* ── RABIA ── */
.signal-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#fff;border-radius:14px;margin-bottom:8px;border:1.5px solid #f0e8e4;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.signal-btn.active{border-color:#E07B54;background:#FDE8E8}
.signal-btn .sig-icon{font-size:24px;flex-shrink:0}
.signal-btn .sig-label{font-size:14px;font-weight:600;color:#3d2e2a}
.frase-card{padding:16px;background:linear-gradient(135deg,#FBF0EB,#F9EDF3);border-radius:14px;margin-bottom:10px;border:1.5px solid #C97B5A33;cursor:pointer;transition:all .2s}
.frase-card.selected{border-color:#C97B5A;box-shadow:0 2px 12px rgba(201,123,90,.2)}
.frase-text{font-size:14px;font-weight:600;color:#3d2e2a;line-height:1.5;font-style:italic}
.frase-sub{font-size:11px;color:#C97B5A;margin-top:6px;font-weight:600}
.resp-btn{flex:1;padding:14px 8px;border-radius:12px;border:1.5px solid #eee;background:#faf8f7;cursor:pointer;text-align:center;font-size:13px;font-weight:600;color:#666;transition:all .2s;font-family:inherit}
.resp-btn.active{border-color:#C97B5A;background:#FBF0EB;color:#C97B5A}
.resp-btn.danger{border-color:#eee}
.resp-btn.danger.active{border-color:#E07B54;background:#FDE8E8;color:#E07B54}
.breath-circle{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#C97B5A,#A0637C);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;text-align:center;transition:transform 1s ease-in-out;box-shadow:0 4px 20px rgba(201,123,90,.3)}
textarea{outline:none;font-family:inherit}
input{font-family:inherit;outline:none}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">🌿</div>
    <div>
      <div class="title" id="page-title">Mi Autocuidado</div>
      <div class="sub">Reset Mental</div>
    </div>
  </div>
  <div id="content">

    <!-- HOY -->
    <div class="page active" id="page-hoy">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:14px;color:#7a6a64;font-weight:600" id="today-label"></span>
        <span style="font-size:13px;color:#C97B5A;font-weight:700" id="today-count"></span>
      </div>
      <div class="pbar-wrap" style="margin-bottom:12px"><div class="pbar-fill" id="today-pbar" style="width:0%"></div></div>
      <div class="scale-legend">
        <div class="legend-chip">😔 No</div>
        <div class="legend-chip">😐 Algo</div>
        <div class="legend-chip">🙂 Regular</div>
        <div class="legend-chip">😊 Bien</div>
        <div class="legend-chip">🌟 Excelente</div>
      </div>
      <div id="habits-list"></div>
      <div class="card" style="margin-top:4px">
        <div class="section-title">Nota del día 📝</div>
        <textarea id="day-note" placeholder="¿Cómo te has sentido hoy?" style="width:100%;min-height:80px;border:1.5px solid #e8ddd8;border-radius:10px;padding:10px;font-size:13px;color:#4a3d38;resize:none;background:#faf8f7" oninput="saveNote()"></textarea>
      </div>
    </div>

    <!-- RETO -->
    <div class="page" id="page-reto">
      <div class="hero-card">
        <div style="font-size:21px;font-weight:800;color:#C97B5A;margin-bottom:4px">Reto 9 días 🌱</div>
        <div style="font-size:13px;color:#7a6a64">Completa un ejercicio cada día para recargar tu energía.</div>
        <div class="day-dots" style="margin-top:12px" id="reto-dots"></div>
        <div style="font-size:12px;color:#C97B5A;margin-top:8px;font-weight:600" id="reto-count">0/9 completados</div>
      </div>
      <div id="challenge-list"></div>
    </div>

    <!-- ARRANCA YA -->
    <div class="page" id="page-arranca">
      <div id="arranca-content"></div>
    </div>

    <!-- RABIA -->
    <div class="page" id="page-rabia">
      <div id="rabia-content"></div>
    </div>

    <!-- PROGRESO -->
    <div class="page" id="page-progreso">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <div class="section-title">Puntuación media diaria (7 días)</div>
        <div class="bar-chart" id="bar-chart"></div>
      </div>
      <div class="card">
        <div class="section-title">Media por área</div>
        <div id="cat-progress"></div>
      </div>
      <div class="card">
        <div class="section-title">Notas recientes 📝</div>
        <div id="recent-notes"></div>
      </div>
    </div>

    <!-- OBJETIVOS -->
    <div class="page" id="page-objetivos">
      <div class="card">
        <div class="section-title">Nuevo objetivo 🎯</div>
        <div style="display:flex;gap:8px">
          <input id="goal-input" type="text" placeholder="¿Qué quieres trabajar?" onkeydown="if(event.key==='Enter')addGoal()" style="flex:1;border:1.5px solid #e8ddd8;border-radius:10px;padding:10px 12px;font-size:14px;background:#faf8f7;color:#4a3d38">
          <button onclick="addGoal()" style="padding:10px 16px;background:#C97B5A;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:20px;cursor:pointer">+</button>
        </div>
      </div>
      <div id="goals-pending"></div>
      <div id="goals-done"></div>
      <div id="goals-empty" style="text-align:center;padding:40px 0;color:#ccc;display:none">
        <div style="font-size:36px;margin-bottom:8px">🎯</div>
        <div style="font-size:14px">Añade tu primer objetivo</div>
      </div>
    </div>

  </div>

  <div id="tabbar">
    <button class="tab-btn active" onclick="switchTab('hoy',this)"><span class="ticon">☀️</span>Hoy<div class="tab-indicator"></div></button>
    <button class="tab-btn" onclick="switchTab('reto',this)"><span class="ticon">🌱</span>Reto<div class="tab-indicator"></div></button>
    <button class="tab-btn" onclick="switchTab('arranca',this)"><span class="ticon">⚡</span>Arranca<div class="tab-indicator"></div></button>
    <button class="tab-btn" onclick="switchTab('rabia',this)"><span class="ticon">😤</span>Rabia<div class="tab-indicator"></div></button>
    <button class="tab-btn" onclick="switchTab('progreso',this)"><span class="ticon">📈</span>Progreso<div class="tab-indicator"></div></button>
    <button class="tab-btn" onclick="switchTab('objetivos',this)"><span class="ticon">🎯</span>Objetivos<div class="tab-indicator"></div></button>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-title">Nota</div>
    <textarea id="modal-textarea" placeholder="¿Cómo ha ido?"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModalNote()">Guardar</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── DATOS BASE ────────────────────────────────────────────────────────────────
const SCALE=[
  {icon:"😔",label:"No",color:"#E07B54",bg:"#FDE8E8"},
  {icon:"😐",label:"Algo",color:"#C97B5A",bg:"#FBF0EB"},
  {icon:"🙂",label:"Regular",color:"#D4A040",bg:"#FBF5E8"},
  {icon:"😊",label:"Bien",color:"#6A9E7A",bg:"#EBF5EE"},
  {icon:"🌟",label:"Excelente",color:"#5A7BA0",bg:"#EBF2FB"},
];
const CATS={
  fisico:{label:"Físico",color:"#C97B5A",bg:"#FBF0EB",icon:"🌿"},
  emocional:{label:"Emocional",color:"#A0637C",bg:"#F9EDF3",icon:"💜"},
  mental:{label:"Mental",color:"#5A7BA0",bg:"#EBF2FB",icon:"🧠"},
  social:{label:"Social",color:"#6A9E7A",bg:"#EBF5EE",icon:"🤝"},
};
const HABITS=[
  {id:"actividad",cat:"fisico",label:"Actividad física (30 min)",desc:"Caminar, yoga, nadar, bailar, bicicleta…"},
  {id:"cuerpo",cat:"fisico",label:"Cuido mi cuerpo",desc:"Baño relajante, mascarilla, crema corporal"},
  {id:"alimenta",cat:"fisico",label:"Alimentación saludable",desc:"Comida nutritiva y rica en proteínas"},
  {id:"sueno",cat:"fisico",label:"Dormir 7-8 horas",desc:"Descanso y recuperación adecuados"},
  {id:"conecta",cat:"emocional",label:"Conecto conmigo",desc:"Pintar, dibujar, música, manualidades"},
  {id:"escribir",cat:"emocional",label:"Escribo mis emociones",desc:"Diario, reflexión, desahogo escrito"},
  {id:"limites",cat:"emocional",label:"Pongo límites",desc:"Digo lo que me molesta y lo que no tolero"},
  {id:"positivos",cat:"mental",label:"Pensamientos compasivos",desc:"Me hablo con amabilidad y validación"},
  {id:"creatividad",cat:"mental",label:"Estimulo mi creatividad",desc:"Arte, escritura, cerámica, música…"},
  {id:"mindful",cat:"mental",label:"Atención plena",desc:"Respiración consciente, meditación"},
  {id:"aprender",cat:"mental",label:"Aprendo algo nuevo",desc:"Taller, documental, lectura, webinar"},
  {id:"recreacion",cat:"social",label:"Tiempo de recreación",desc:"Algo que disfruto y me genera interés"},
  {id:"socializar",cat:"social",label:"Me relaciono con otros",desc:"Café, videollamada, salida con amistades"},
  {id:"afecto",cat:"social",label:"Doy y recibo afecto",desc:"Mensajes, elogios, reconocimiento"},
];
const CHALLENGES=[
  {day:1,title:"Frente al espejo",icon:"🪞",desc:"Mírate y escríbete con autocompasión. ¿Qué ves más allá de lo físico?"},

const KEY="autocuidado_v4";

function loadState(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch{}
  return{habitLog:{},challengeLog:{},testAnswers:[],goals:[],notes:{}};
}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch{}}

function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short"});}
function last7(){return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().slice(0,10);});}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function dayScore(d){const log=state.habitLog[d]||{};const vals=Object.values(log).filter(v=>v!==null&&v!==undefined);if(!vals.length)return 0;return vals.reduce((s,v)=>s+v,0)/vals.length;}
function dayPct(d){const log=state.habitLog[d]||{};const done=Object.values(log).filter(v=>v!==null&&v!==undefined&&v>0).length;return Math.round(done/HABITS.length*100);}

const PAGE_TITLES={hoy:"Mi Autocuidado",reto:"Reto 9 días",arranca:"⚡ Arranca Ya",rabia:"😤 Gestiona la Rabia",progreso:"Mi Progreso",objetivos:"Mis Objetivos"};
function switchTab(name,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  btn.classList.add("active");
  document.getElementById("page-title").textContent=PAGE_TITLES[name];
  document.getElementById("content").scrollTop=0;
  if(name==="hoy")renderHoy();
  if(name==="reto")renderReto();
  if(name==="arranca"){arrancaStep=0;arrancaSituation=null;arrancaTaskDone=null;arrancaFeeling=null;renderArranca();}
  if(name==="rabia"){rabiaStep=0;rabiaSignals=[];rabiaFrase=null;rabiaEsperar=null;renderRabia();}
  if(name==="progreso")renderProgreso();
  if(name==="objetivos")renderObjetivos();
}

// ── HOY ───────────────────────────────────────────────────────────────────────
function renderHoy(){
  const d=today();const log=state.habitLog[d]||{};
  const scored=Object.values(log).filter(v=>v!==null&&v!==undefined&&v>0).length;
  const registered=Object.values(log).filter(v=>v!==null&&v!==undefined).length;
  const avg=dayScore(d);const avgSc=SCALE[Math.round(avg)]||SCALE[0];
  document.getElementById("today-label").textContent=fmtDate(d);
  document.getElementById("today-count").textContent=registered>0?`${scored}/${HABITS.length} · ${avgSc.icon} ${avgSc.label}`:`0/${HABITS.length} hábitos`;
  document.getElementById("today-pbar").style.width=dayPct(d)+"%";
  document.getElementById("day-note").value=state.notes[d]||"";
  const list=document.getElementById("habits-list");list.innerHTML="";
  Object.entries(CATS).forEach(([cat,meta])=>{
    const wrap=document.createElement("div");wrap.style.marginBottom="18px";
    const hdr=document.createElement("div");hdr.className="cat-header";
    hdr.innerHTML=`<span style="font-size:16px">${meta.icon}</span><span class="cat-label" style="color:${meta.color}">${meta.label}</span>`;
    wrap.appendChild(hdr);
    HABITS.filter(h=>h.cat===cat).forEach(h=>{
      const level=log[h.id]!==undefined&&log[h.id]!==null?log[h.id]:-1;
      const sc=level>=0?SCALE[level]:null;
      const card=document.createElement("div");card.className="habit-item";
      if(sc)card.style.borderColor=sc.color+"44";
      const top=document.createElement("div");top.className="habit-top";
      top.innerHTML=`<div><div class="habit-label">${h.label}</div><div class="habit-desc">${h.desc}</div></div>`;
      if(sc){const badge=document.createElement("span");badge.className="habit-score-badge";badge.style.background=sc.bg;badge.style.color=sc.color;badge.textContent=sc.icon+" "+sc.label;top.appendChild(badge);}
      card.appendChild(top);
      const row=document.createElement("div");row.className="scale-row";
      SCALE.forEach((s,i)=>{
        const btn=document.createElement("div");btn.className="scale-btn"+(level===i?" active":"");btn.dataset.level=i;
        btn.innerHTML=`<span class="s-icon">${s.icon}</span><span class="s-label">${s.label}</span>`;
        btn.onclick=()=>setHabitLevel(h.id,level===i?null:i);
        row.appendChild(btn);
      });
      card.appendChild(row);wrap.appendChild(card);
    });
    list.appendChild(wrap);
  });
}
function setHabitLevel(id,level){
  const d=today();if(!state.habitLog[d])state.habitLog[d]={};
  state.habitLog[d][id]=level;persist();renderHoy();
  if(level===4)toast("¡Excelente! 🌟");
}
function saveNote(){state.notes[today()]=document.getElementById("day-note").value;persist();}

// ── RETO ──────────────────────────────────────────────────────────────────────
function renderReto(){
  const comp=CHALLENGES.filter(c=>state.challengeLog[c.day]?.done).length;
  document.getElementById("reto-count").textContent=comp+"/9 completados";
  const dots=document.getElementById("reto-dots");dots.innerHTML="";
  CHALLENGES.forEach(c=>{const dd=document.createElement("div");dd.className="day-dot"+(state.challengeLog[c.day]?.done?" done":"");dd.textContent=c.day;dots.appendChild(dd);});
  const list=document.getElementById("challenge-list");list.innerHTML="";
  CHALLENGES.forEach(c=>{
    const log=state.challengeLog[c.day]||{};
    const card=document.createElement("div");card.className="challenge-card"+(log.done?" done":"");
    card.innerHTML=`<div class="challenge-icon">${c.icon}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:#C97B5A;font-weight:700">DÍA ${c.day}</span><button class="btn-mark${log.done?" done":""}" onclick="toggleChallenge(${c.day})">${log.done?"✓ Hecho":"Marcar"}</button></div><div style="font-size:15px;font-weight:700;color:#3d2e2a;margin-top:2px">${c.title}</div><div style="font-size:12px;color:#aaa;margin-top:4px;line-height:1.5">${c.desc}</div>${log.note?`<div style="font-size:12px;color:#7a6a64;margin-top:6px;font-style:italic;background:#faf8f7;padding:6px 10px;border-radius:8px">"${log.note}"</div>`:""}<div style="margin-top:8px"><button class="btn-note" onclick="openModal(${c.day})">${log.note?"✏️ Editar nota":"📝 Añadir nota"}</button></div></div>`;
    list.appendChild(card);
  });
}
function toggleChallenge(day){
  if(!state.challengeLog[day])state.challengeLog[day]={};
  state.challengeLog[day].done=!state.challengeLog[day].done;
  persist();renderReto();if(state.challengeLog[day].done)toast("¡Día "+day+" completado! 🌱");
}
function openModal(day){
  modalDay=day;
  document.getElementById("modal-title").textContent="Nota — Día "+day+": "+CHALLENGES[day-1].title;
  document.getElementById("modal-textarea").value=state.challengeLog[day]?.note||"";
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(()=>document.getElementById("modal-textarea").focus(),100);
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");modalDay=null;}
function saveModalNote(){
  if(modalDay===null)return;
  if(!state.challengeLog[modalDay])state.challengeLog[modalDay]={};
  state.challengeLog[modalDay].note=document.getElementById("modal-textarea").value;
  persist();closeModal();renderReto();toast("Nota guardada 📝");
}

      html+=`<button class="btn-primary" onclick="arrancaStep2()">¡Lo he hecho! ¿Cómo me siento? →</button>`;
    }

      html+=`<div class="feeling-btn${arrancaFeeling===i?" active":""}" onclick="selectFeeling(${i})"><span style="font-size:24px">${f.icon}</span><span>${f.label}</span></div>`;

    html+=`<div class="card"><div style="font-size:13px;color:#7a6a64;text-align:center;margin-bottom:20px;line-height:1.6">Inhala 4 segundos → aguanta 4 → exhala 4.<br>Repite 3 veces.</div><div class="breath-circle" id="breath-circle">Pulsa<br>para<br>empezar</div><div style="text-align:center;margin-top:16px"><button onclick="startBreath()" style="background:none;border:1.5px solid #E07B54;border-radius:20px;padding:8px 20px;color:#E07B54;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">Iniciar respiración</button></div></div>`;
    html+=`<div style="font-size:13px;font-weight:700;color:#3d2e2a;margin:16px 0 10px">Ahora elige:</div><div style="font-size:12px;color:#aaa;margin-bottom:12px">¿Respondes ahora o esperas?</div><div style="display:flex;gap:10px">`;
    html+=`<div class="resp-btn danger${rabiaEsperar===false?" active":""}" onclick="selectEsperar(false)">Respondo ahora<br><span style="font-size:10px;font-weight:400">con calma</span></div>`;
    html+=`<div class="resp-btn${rabiaEsperar===true?" active":""}" onclick="selectEsperar(true)">Espero un poco<br><span style="font-size:10px;font-weight:400">cuando esté más tranquila</span></div>`;
    html+=`</div>`;
    if(rabiaEsperar!==null){
      const msg=rabiaEsperar
        ?"⏸️ Buena decisión. Esperar no es huir, es elegir el mejor momento para ti."
        :"💬 Recuerda: frase de anclaje, tono calmado, y solo lo necesario.";
      html+=`<div class="card" style="margin-top:12px;background:#FBF0EB;border:none"><div style="font-size:13px;color:#C97B5A;line-height:1.6">${msg}</div></div>`;
      html+=`<button class="btn-primary" style="background:#E07B54" onclick="rabiaNext(4)">Último paso →</button>`;
    }
    el.innerHTML=html;
  } else if(rabiaStep===4){
    let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><button onclick="rabiaBack(3)" style="background:none;border:none;font-size:22px;cursor:pointer;color:#E07B54">←</button><div style="font-size:15px;font-weight:700;color:#3d2e2a">Paso 5 — Después</div></div>`;
    html+=`<div class="card" style="background:linear-gradient(135deg,#FBF0EB,#F9EDF3);border:none"><div style="font-size:13px;color:#7a6a64;line-height:1.6">Para aprender, no para machacarte.<br>Solo 2 líneas.</div></div>`;
    html+=`<div class="card"><div style="font-size:13px;font-weight:600;color:#3d2e2a;margin-bottom:8px">¿Qué hice bien esta vez?</div><textarea placeholder="Aunque sea pequeño… detecté la señal, respiré, no exploté…" style="width:100%;min-height:80px;border:1.5px solid #e8ddd8;border-radius:10px;padding:10px;font-size:13px;background:#faf8f7;color:#3d2e2a;resize:none"></textarea></div>`;
    html+=`<div class="card"><div style="font-size:13px;font-weight:600;color:#3d2e2a;margin-bottom:8px">¿Qué haría diferente la próxima vez?</div><textarea placeholder="No juzgues, solo observa…" style="width:100%;min-height:80px;border:1.5px solid #e8ddd8;border-radius:10px;padding:10px;font-size:13px;background:#faf8f7;color:#3d2e2a;resize:none"></textarea></div>`;
    html+=`<div class="card" style="background:#EBF5EE;border:1.5px solid #6A9E7A33"><div style="font-size:13px;color:#3d2e2a;line-height:1.7">💚 Has completado el proceso. Cada vez que lo uses, tu cerebro aprende que <strong>hay otra forma de gestionar esto</strong>. No de golpe, poco a poco.</div></div>`;
    html+=`<button class="btn-primary" style="background:#E07B54" onclick="resetRabia()">Terminar</button>`;
    el.innerHTML=html;
  }
}
function toggleSignal(i){
  const idx=rabiaSignals.indexOf(i);
  if(idx>=0)rabiaSignals.splice(idx,1);else rabiaSignals.push(i);
  renderRabia();
}
function rabiaNext(step){rabiaStep=step;renderRabia();document.getElementById("content").scrollTop=0;}
function rabiaBack(step){rabiaStep=step;renderRabia();document.getElementById("content").scrollTop=0;}
function checkRabiaText(){
  const btn=document.getElementById("rabia-next-btn");
  const val=document.getElementById("rabia-text")?.value||"";
  if(btn){btn.style.opacity=val.trim().length>5?"1":"0.5";btn.style.pointerEvents=val.trim().length>5?"auto":"none";}
}
function selectFrase(i){rabiaFrase=i;renderRabia();}
function selectEsperar(v){rabiaEsperar=v;renderRabia();}
function startBreath(){
  const circle=document.getElementById("breath-circle");if(!circle)return;
  let count=0;const phases=["Inhala...","Aguanta...","Exhala..."];const dur=[4000,4000,4000];
  if(breathInterval)clearInterval(breathInterval);
  function run(){
    const phase=count%3;
    circle.textContent=phases[phase];
    if(phase===0){circle.style.transform="scale(1.3)";}
    else if(phase===1){circle.style.transform="scale(1.3)";}
    else{circle.style.transform="scale(1)";}
    count++;if(count>=9){clearInterval(breathInterval);setTimeout(()=>{circle.textContent="✓ Listo";circle.style.transform="scale(1)";},dur[2]);}
  }
  run();breathInterval=setInterval(run,4000);
}
function resetRabia(){rabiaStep=0;rabiaSignals=[];rabiaFrase=null;rabiaEsperar=null;if(breathInterval)clearInterval(breathInterval);renderRabia();toast("¡Bien gestionado! 💪");}

// ── PROGRESO ──────────────────────────────────────────────────────────────────
function renderProgreso(){
  const d=today();
  const totalDays=Object.keys(state.habitLog).filter(k=>Object.values(state.habitLog[k]).some(v=>v!==null&&v!==undefined)).length;
  const totalChecks=Object.values(state.habitLog).reduce((s,dl)=>s+Object.values(dl).filter(v=>v!==null&&v!==undefined&&v>0).length,0);
  const retoDone=Object.values(state.challengeLog).filter(v=>v.done).length;
  const gDone=state.goals.filter(g=>g.done).length;
  let allVals=[];Object.values(state.habitLog).forEach(dl=>Object.values(dl).forEach(v=>{if(v!==null&&v!==undefined)allVals.push(v);}));
  const globalAvg=allVals.length?allVals.reduce((s,v)=>s+v,0)/allVals.length:0;
  const avgSc=SCALE[Math.round(globalAvg)]||SCALE[0];
  const sg=document.getElementById("stats-grid");sg.innerHTML="";
  [{label:"Hábitos registrados",val:totalChecks,icon:"✅"},{label:"Días activos",val:totalDays,icon:"📅"},{label:"Media global",val:avgSc.icon+" "+avgSc.label,icon:"📊"},{label:"Reto / Objetivos",val:retoDone+"/9 · "+gDone+"/"+state.goals.length,icon:"🎯"}].forEach(s=>{
    const c=document.createElement("div");c.className="stat-card";
    c.innerHTML=`<div style="font-size:22px">${s.icon}</div><div class="stat-val" style="font-size:18px;margin-top:4px">${s.val}</div><div class="stat-lbl">${s.label}</div>`;
    sg.appendChild(c);
  });
  const days=last7();const bc=document.getElementById("bar-chart");bc.innerHTML="";
  days.forEach(dd=>{
    const score=dayScore(dd);const h=Math.max(4,Math.round(score/4*64));
    const hasData=Object.keys(state.habitLog[dd]||{}).length>0;
    const wd=new Date(dd+"T12:00:00").toLocaleDateString("es-ES",{weekday:"narrow"});
    const sc=SCALE[Math.round(score)];
    const col=document.createElement("div");col.className="bar-col";
    col.innerHTML=`<div class="bar${hasData?" filled":""}" style="height:${h}px;${hasData?`background:${sc.color}`:""}"></div><span class="bar-lbl">${wd}</span>`;
    bc.appendChild(col);
  });
  const cp=document.getElementById("cat-progress");cp.innerHTML="";
  Object.entries(CATS).forEach(([cat,meta])=>{
    const ids=HABITS.filter(h=>h.cat===cat).map(h=>h.id);let vals=[];
    Object.values(state.habitLog).forEach(dl=>ids.forEach(id=>{const v=dl[id];if(v!==null&&v!==undefined)vals.push(v);}));
    const avg=vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:0;
    const pct=Math.round(avg/4*100);const sc=SCALE[Math.round(avg)];
    const row=document.createElement("div");row.style.marginBottom="12px";
    row.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;color:${meta.color};font-weight:600">${meta.icon} ${meta.label}</span><span style="font-size:12px;color:${meta.color};font-weight:600">${sc?sc.icon+" "+sc.label:"—"}</span></div><div class="pbar-wrap"><div style="width:${pct}%;height:100%;background:${meta.color};border-radius:4px;transition:width .4s"></div></div>`;
    cp.appendChild(row);
  });
  const rn=document.getElementById("recent-notes");rn.innerHTML="";
  const ne=Object.entries(state.notes).filter(([,v])=>v).slice(-3).reverse();
  if(!ne.length){rn.innerHTML='<div style="font-size:13px;color:#ccc;text-align:center;padding:8px 0">No hay notas aún</div>';return;}
  ne.forEach(([dd,note])=>{
    const el=document.createElement("div");el.style.cssText="margin-bottom:10px;padding:10px 12px;background:#faf8f7;border-radius:10px";
    el.innerHTML=`<div style="font-size:11px;color:#C97B5A;font-weight:600;margin-bottom:4px">${fmtDate(dd)}</div><div style="font-size:13px;color:#4a3d38;line-height:1.5">${note}</div>`;
    rn.appendChild(el);
  });
}

// ── OBJETIVOS ─────────────────────────────────────────────────────────────────
function renderObjetivos(){
  const pending=state.goals.filter(g=>!g.done);const done=state.goals.filter(g=>g.done);
  document.getElementById("goals-empty").style.display=state.goals.length===0?"block":"none";
  const rp=document.getElementById("goals-pending");rp.innerHTML="";
  if(pending.length){
    const t=document.createElement("div");t.className="section-title";t.textContent="En progreso";rp.appendChild(t);
    pending.forEach(g=>{
      const el=document.createElement("div");el.className="goal-item";
      el.innerHTML=`<div class="goal-check" onclick="toggleGoal(${g.id})"></div><span class="goal-text">${g.text}</span><button class="goal-del" onclick="deleteGoal(${g.id})">×</button>`;
      rp.appendChild(el);
    });
  }
  const rd=document.getElementById("goals-done");rd.innerHTML="";
  if(done.length){
    const t=document.createElement("div");t.className="section-title";t.textContent="Conseguidos ✨";rd.appendChild(t);
    done.forEach(g=>{
      const el=document.createElement("div");el.className="goal-item";el.style.opacity=".7";
      el.innerHTML=`<div class="goal-check done" onclick="toggleGoal(${g.id})">✓</div><span class="goal-text done">${g.text}</span><button class="goal-del" onclick="deleteGoal(${g.id})">×</button>`;
      rd.appendChild(el);
    });
  }
}
function addGoal(){const inp=document.getElementById("goal-input");const text=inp.value.trim();if(!text)return;state.goals.push({id:Date.now(),text,done:false,created:today()});inp.value="";persist();renderObjetivos();toast("Objetivo añadido 🎯");}
function toggleGoal(id){const g=state.goals.find(x=>x.id===id);if(!g)return;g.done=!g.done;persist();renderObjetivos();if(g.done)toast("¡Objetivo conseguido! 🌸");}
function deleteGoal(id){state.goals=state.goals.filter(g=>g.id!==id);persist();renderObjetivos();}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderHoy();
</script>
